<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relative Clauses – PPP Lesson</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --border: #b8b0a0;
    --accent: #c45f00;
    --accent-light: #ffe8cc;
    --accent-dark: #7a3b00;
    --accent2: #3a28b0;
    --accent2-light: #dcdaff;
    --accent2-dark: #1e1470;
    --text: #0d0d1f;
    --muted: #45435a;
    --green: #0b4a2c;
    --green-light: #c8f0da;
    --blue: #0a3d82;
    --blue-light: #cce0fa;
    --font-display: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    margin: 0;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
  }

  h1 {
    font-family: var(--font-display);
    margin-bottom: 1rem;
    color: var(--accent2-dark);
    font-size: clamp(2.5rem, 5vw, 4rem);
  }

  p {
    line-height: 1.75;
    color: var(--muted);
    margin-top: 1rem;
  }
</style>
</head>
<body>
  <main class="page">
    <h1>Relative Clauses – PPP Lesson</h1>
    <p>Welcome to the Relative Clauses lesson page. Add your lesson content here and it will be visible on GitHub Pages.</p>
  </main>
</body>
</html>
